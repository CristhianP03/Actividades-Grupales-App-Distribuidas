syntax = "proto3";

option java_package = "grpc.generated";
option java_outer_classname = "NodoProto";
option java_multiple_files = true;

service NodoService {
  rpc Enviar (Mensaje) returns (Respuesta);
}

message Mensaje {
  string sender    = 1;
  int64  timestamp = 2;
  string message   = 3;
}

message Respuesta {
  string responder = 1;
  int64  timestamp = 2;
}